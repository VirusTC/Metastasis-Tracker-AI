name: Metastasis-Tracker-AI Continuous Integration Suite

on:
  push:
    branches: [ "main", "development" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-anatomy-pipeline:
    runs-on: ubuntu-latest

steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python 3.11 environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

  - name: Compile and Flatten Ingestion Spreadsheet logs
    run: |
      if [ -f src/data/fhir/compile_csv.sh ]; then
        chmod +x src/data/fhir/compile_csv.sh
        ./src/data/fhir/compile_csv.sh
      fi

  - name: Run Automated Spreadsheet Anomaly Detection Checkpoint
    run: |
      chmod +x src/data/fhir/run_diagnostics.sh
      ./src/data/fhir/run_diagnostics.sh

    - name: Install Ingestion Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pyyaml matplotlib

    - name: Grant Shell Script Write Permissions
      run: chmod +x run_pipeline.sh

    - name: Grant Shell Script Write Permissions
      run: chmod +x run_pipeline.sh src/check_md_links.sh

    - name: Execute Automated Markdown File Link Verification
      run: ./src/check_md_links.sh

    - name: Execute Aerodynamic Gas Jet and Reflex Verification Matrix
      run: python3 src/respiratory_reflex_engine.py

    - name: Run Unified Ecosystem Pipeline Platform Driver
      run: ./run_pipeline.sh

    - name: Execute Electrophysiological Cardiac Test Matrix
      run: python3 src/cardiac_ecg_engine.py

    - name: Execute Aerodynamic Gas Jet and Reflex Verification Matrix
      run: python3 src/respiratory_reflex_engine.py

    - name: Execute Automated HDF5 Data Container Compliance Verification Checks
      run: python3 src/pulmonary_hdf5_core.py

    - name: Run Automated Plot Layout Overlap Validation Testing
      run: python3 src/validate_plots.py
      
    - name: Execute End-to-End Integration Validation Checks
      run: python3 -m unittest tests/test_integration_pipeline.py

    - name: Dispatch Outbound Webhook Alert on Core Failure
      if: failure()
      env:
        WEBHOOK_URL: ${{ secrets.DEVELOPER_WEBHOOK_ENDPOINT }}
      run: |
        echo "Validation boundary breach detected. Dispatching diagnostic telemetry..."
        curl -X POST -H "Content-Type: application/json" \
          -d '{
            "text": "🚨 *CRITICAL PIPELINE FAILURE*: Metastasis-Tracker-AI CI/CD pipeline check has failed standard validation bounds.",
            "attachments": [
              {
                "color": "danger",
                "fields": [
                  { "title": "Repository Vector", "value": "${{ github.repository }}", "short": true },
                  { "title": "Commit Trigger ID", "value": "`${{ github.sha }}`", "short": true },
                  { "title": "Ref Target Branch", "value": "${{ github.ref }}", "short": true },
                  { "title": "Workflow Diagnostic Execution Logs", "value": "https://github.com{{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                ]
              }
            ]
          }' $WEBHOOK_URL
